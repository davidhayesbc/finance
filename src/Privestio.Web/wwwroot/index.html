<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privestio</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <script>
        (function () {
            const storageKey = "privestio-theme";
            const preference = localStorage.getItem(storageKey) || "system";
            const isDark = preference === "dark"
                || (preference === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);

            document.documentElement.dataset.theme = isDark ? "dark" : "light";
            document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        })();
    </script>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="Privestio.Web.styles.css" />
    <!-- Fluent UI design tokens and styles (Task 1.8) -->
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <script type="importmap"></script>
</head>

<body>
    <!-- Accessibility: skip link target is in MainLayout (Task 1.20) -->
    <div id="app">
        <main aria-label="Loading Privestio" aria-busy="true" aria-live="polite">
            <p>Loading Privestio...</p>
        </main>
    </div>

    <div id="blazor-error-ui" role="alert" aria-live="assertive">
        An unrecoverable error has occurred. Please
        <a href="." class="reload">reload</a> the page.
        <a class="dismiss">🗙</a>
    </div>

    <script src="js/indexeddb.js"></script>
    <script src="js/connectivity.js"></script>
    <script src="js/pwa-install.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/ui-state.js"></script>
    <script>
        (async function bootPrivestio() {
            const isLocalhost = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";

            if (isLocalhost && "serviceWorker" in navigator) {
                try {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map(registration => registration.unregister()));

                    if ("caches" in window) {
                        const cacheKeys = await caches.keys();
                        const runtimeCaches = cacheKeys.filter(key =>
                            key.startsWith("offline-cache-") || key.startsWith("privestio-") || key.startsWith("dotnet-resources")
                        );

                        await Promise.all(runtimeCaches.map(key => caches.delete(key)));
                    }
                }
                catch (error) {
                    console.warn("Privestio localhost cleanup failed before boot.", error);
                }
            }

            const script = document.createElement("script");
            script.src = isLocalhost
                ? "_framework/blazor.webassembly.js"
                : "_framework/blazor.webassembly#[.{fingerprint}].js";
            document.body.appendChild(script);
        })();
    </script>
</body>

</html>
